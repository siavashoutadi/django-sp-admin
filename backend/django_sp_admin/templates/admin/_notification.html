<style>
  @keyframes slideIn {
    from {
      transform: translateX(100%);
      opacity: 0;
    }
    to {
      transform: translateX(0);
      opacity: 1;
    }
  }
  
  @keyframes slideOut {
    from {
      transform: translateX(0);
      opacity: 1;
    }
    to {
      transform: translateX(100%);
      opacity: 0;
    }
  }
  
  .notification-message {
    animation: slideIn 0.3s ease-out;
  }
  
  .notification-message.hiding {
    animation: slideOut 0.3s ease-out forwards;
  }
</style>

<div class="fixed top-6 right-6 z-50 max-w-sm space-y-2">
  {% if messages %}
    {% for message in messages %}
      <div class="card notification-message
        {% if message.tags == 'error' %}
          
          border-l-4 border-red-500

        {% elif message.tags == 'warning' %}
          
          border-l-4 border-amber-500

        {% elif message.tags == 'success' %}
          
          border-l-4 border-green-500

        {% else %}
          
          border-l-4 border-blue-500

        {% endif %}
      "
        role="alert">
        <div class="card-content card-content-sm">
          <div class="flex items-start gap-3">
            <div class="flex-shrink-0">
              {% if message.tags == 'success' %}
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-5 h-5 text-green-600">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
              {% elif message.tags == 'error' %}
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-5 h-5 text-red-600">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
              {% elif message.tags == 'warning' %}
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-5 h-5 text-amber-600">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
              {% else %}
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-5 h-5 text-blue-600">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
              {% endif %}
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm text-[var(--color-foreground)]">{{ message }}</p>
            </div>
            <button type="button" class="btn btn-ghost btn-icon-sm flex-shrink-0" onclick="this.closest('[role=alert]').remove()" aria-label="Close notification">
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    {% endfor %}
  {% endif %}
</div>

<script>
  // Auto-dismiss notifications after 5 seconds
  document.addEventListener('DOMContentLoaded', function () {
    const messages = document.querySelectorAll('.notification-message')
    messages.forEach(function (message) {
      setTimeout(function () {
        message.classList.add('hiding')
        setTimeout(function () {
          message.remove()
        }, 300)
      }, 5000)
    })
  })
</script>
